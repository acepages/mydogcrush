<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyDogCrush - Iniciar sesión</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('fondo.png') center/cover no-repeat;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.95);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.18);
    }
    h1 { margin: 0 0 8px; text-align: center; color: #333; }
    p { margin: 0 0 16px; text-align: center; color: #666; font-size: 14px; }
    label { display: block; margin: 12px 0 6px; font-weight: bold; color: #444; }
    input { width: 100%; padding: 12px 14px; border: 1px solid #ddd; border-radius: 12px; font-size: 15px; }
    button { width: 100%; margin-top: 18px; padding: 12px 16px; border: none; border-radius: 999px; background: #d81b60; color: white; font-size: 16px; font-weight: bold; cursor: pointer; }
    .link { display: block; margin-top: 12px; text-align: center; color: #d81b60; text-decoration: none; font-size: 14px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Iniciar sesión</h1>
    <p>Ingresa tu correo y contraseña para entrar.</p>

    <label for="email">Correo</label>
    <input id="email" type="email" placeholder="Ej. ana@email.com" />

    <label for="password">Contraseña</label>
    <input id="password" type="password" placeholder="Tu contraseña" />

    <button id="loginButton" type="button" onclick="login()">Entrar</button>
    <div id="codeSection" class="hidden">
      <label for="code">Código de verificación</label>
      <input id="code" type="text" placeholder="Ingresa el código recibido" />
      <button type="button" onclick="verifyCode()">Verificar y entrar</button>
    </div>
    <a class="link" href="index.html">Volver</a>
  </div>

  <script>
    let pendingEmail = '';
    let pendingCode = '';
    let requiresVerification = false;

    function shouldRequireVerification(email) {
      const sessionCounts = JSON.parse(localStorage.getItem('mydogcrushSessionCounts') || '{}');
      const currentCount = sessionCounts[email] || 0;
      // Pide verificación en la primera vez (0) y cada 7 sesiones (7, 14, 21, etc.)
      return currentCount === 0 || currentCount % 7 === 0;
    }

    function incrementSessionCount(email) {
      const sessionCounts = JSON.parse(localStorage.getItem('mydogcrushSessionCounts') || '{}');
      sessionCounts[email] = (sessionCounts[email] || 0) + 1;
      localStorage.setItem('mydogcrushSessionCounts', JSON.stringify(sessionCounts));
    }

    function login() {
      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const users = JSON.parse(localStorage.getItem('mydogcrushUsers') || '{}');
      const user = users[email];

      if (!user) {
        alert('No existe una cuenta con ese correo.');
        return;
      }

      if (user.password !== password) {
        alert('La contraseña es incorrecta.');
        return;
      }

      pendingEmail = email;
      incrementSessionCount(email);
      requiresVerification = shouldRequireVerification(email);

      if (!requiresVerification) {
        // Login directo sin código
        localStorage.setItem('mydogcrushLoggedIn', 'true');
        localStorage.setItem('mydogcrushUserEmail', email);
        window.location.href = 'main.html';
        return;
      }

      // Mostrar pantalla de verificación
      pendingCode = Math.floor(100000 + Math.random() * 900000).toString();
      const codeInput = document.getElementById('code');
      codeInput.value = '';
      codeInput.placeholder = 'Ingresa el código recibido por correo';

      document.getElementById('loginButton').classList.add('hidden');
      document.getElementById('codeSection').classList.remove('hidden');

      fetch('http://localhost:3000/send-code', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, code: pendingCode })
      })
        .then(async response => {
          const data = await response.json().catch(() => ({}));
          if (!response.ok) throw new Error(data.message || 'No se pudo enviar el correo');

          if (data.fallback) {
            alert('No se pudo enviar el correo. Revisa tu configuración SMTP o intenta nuevamente.');
          } else {
            alert('Se enviará un código de verificación a tu correo electrónico. Revisa tu bandeja de entrada.');
          }
        })
        .catch(error => {
          console.error(error);
          alert('No se pudo enviar el correo. Revisa tu configuración SMTP o intenta nuevamente.');
        });
    }

    function verifyCode() {
      const enteredCode = document.getElementById('code').value.trim();
      if (enteredCode === pendingCode) {
        localStorage.setItem('mydogcrushLoggedIn', 'true');
        localStorage.setItem('mydogcrushUserEmail', pendingEmail);
        window.location.href = 'main.html';
      } else {
        alert('El código ingresado es incorrecto.');
      }
    }
  </script>
</body>
</html>
