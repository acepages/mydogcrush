<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyDogCrush - Cuenta</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('fondo.png') center/cover no-repeat;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.95);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.18);
    }
    h1 { margin: 0 0 8px; text-align: center; color: #333; }
    p { margin: 0 0 16px; text-align: center; color: #666; font-size: 14px; }
    label { display: block; margin: 12px 0 6px; font-weight: bold; color: #444; }
    input { width: 100%; padding: 12px 14px; border: 1px solid #ddd; border-radius: 12px; font-size: 15px; }
    button { width: 100%; margin-top: 18px; padding: 12px 16px; border: none; border-radius: 999px; background: #d81b60; color: white; font-size: 16px; font-weight: bold; cursor: pointer; }
    .link { display: block; margin-top: 12px; text-align: center; color: #d81b60; text-decoration: none; font-size: 14px; }
    .bottom-nav { display: flex; justify-content: space-around; align-items: center; margin-top: 18px; padding-top: 14px; border-top: 1px solid #f0d6e2; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #666; font-size: 12px; text-decoration: none; }
    .nav-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: #fff3f8; color: #d81b60; font-size: 18px; }
    .nav-item.active { color: #d81b60; font-weight: bold; }
    .nav-item.active .nav-icon { background: #d81b60; color: white; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Mi cuenta</h1>
    <p>Aquí puedes actualizar tus datos básicos.</p>

    <label for="ownerName">Nombre del dueño</label>
    <input id="ownerName" type="text" placeholder="Tu nombre" />

    <label for="email">Correo electrónico</label>
    <input id="email" type="email" placeholder="correo@ejemplo.com" />

    <label for="phone">Número de teléfono</label>
    <input id="phone" type="tel" placeholder="Ej. 555-1234" />

    <button type="button" onclick="saveAccount()">Guardar cambios</button>
    <a class="link" href="main.html">Volver</a>

    <div class="bottom-nav">
      <a class="nav-item" href="photos.html">
        <div class="nav-icon">👤</div>
        <span>Perfil</span>
      </a>
      <a class="nav-item" href="chats.html">
        <div class="nav-icon">💌</div>
        <span>Chats</span>
      </a>
      <a class="nav-item" href="main.html">
        <div class="nav-icon">💬</div>
        <span>Ver perfiles</span>
      </a>
      <a class="nav-item" href="donate.html">
        <div class="nav-icon">❤️</div>
        <span>Donar</span>
      </a>
      <a class="nav-item active" href="account.html">
        <div class="nav-icon">⚙️</div>
        <span>Cuenta</span>
      </a>
    </div>
  </div>

  <script>
    function loadAccount() {
      const account = JSON.parse(localStorage.getItem('mydogcrushAccount') || '{}');
      document.getElementById('ownerName').value = account.ownerName || '';
      document.getElementById('email').value = account.email || '';
      document.getElementById('phone').value = account.phone || '';
    }

    function saveAccount() {
      const ownerName = document.getElementById('ownerName').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();

      if (!ownerName || !email) {
        alert('Por favor completa el nombre y el correo electrónico.');
        return;
      }

      const account = { ownerName, email, phone };
      localStorage.setItem('mydogcrushAccount', JSON.stringify(account));
      alert('Datos de cuenta guardados correctamente.');
    }

    window.addEventListener('load', loadAccount);
  </script>
</body>
</html>
