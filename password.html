<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyDogCrush - Contraseña</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('fondo.png') center/cover no-repeat;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.95);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.18);
    }
    h1 { margin: 0 0 8px; text-align: center; color: #333; }
    p { margin: 0 0 16px; text-align: center; color: #666; font-size: 14px; }
    label { display: block; margin: 12px 0 6px; font-weight: bold; color: #444; }
    input { width: 100%; padding: 12px 14px; border: 1px solid #ddd; border-radius: 12px; font-size: 15px; }
    button { width: 100%; margin-top: 18px; padding: 12px 16px; border: none; border-radius: 999px; background: #d81b60; color: white; font-size: 16px; font-weight: bold; cursor: pointer; }
    .link { display: block; margin-top: 12px; text-align: center; color: #d81b60; text-decoration: none; font-size: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Crea tu contraseña</h1>
    <p>Ya casi estás listo para entrar a MyDogCrush.</p>

    <label for="password">Contraseña</label>
    <input id="password" type="password" placeholder="Crea una contraseña" />

    <label for="confirmPassword">Confirmar contraseña</label>
    <input id="confirmPassword" type="password" placeholder="Repite la contraseña" />

    <button type="button" onclick="createAccount()">Crear cuenta e entrar</button>
    <a class="link" href="photos.html">Volver</a>
  </div>

  <script>
    function createAccount() {
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const email = (localStorage.getItem('mydogcrushPendingEmail') || '').toLowerCase();

      if (!password || password.length < 6) {
        alert('La contraseña debe tener al menos 6 caracteres.');
        return;
      }

      if (password !== confirmPassword) {
        alert('Las contraseñas no coinciden.');
        return;
      }

      const users = JSON.parse(localStorage.getItem('mydogcrushUsers') || '{}');
      if (users[email]) {
        users[email].password = password;
        localStorage.setItem('mydogcrushUsers', JSON.stringify(users));
      }

      localStorage.setItem('mydogcrushLoggedIn', 'true');
      localStorage.removeItem('mydogcrushPendingEmail');
      window.location.href = 'main.html';
    }
  </script>
</body>
</html>
