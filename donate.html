<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyDogCrush - Donar</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #fff7f2, #ffe7db);
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .phone {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 16px 40px rgba(0,0,0,0.18);
    }
    .header {
      padding: 18px 20px 8px;
      text-align: center;
      font-weight: bold;
      font-size: 22px;
      color: #ff6b6b;
      position: relative;
    }
    .session-button {
      position: absolute;
      top: 18px;
      right: 16px;
      border: none;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      background: #ff6b6b;
      color: white;
    }
    .content {
      padding: 20px;
      min-height: 500px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    .content h1 {
      font-size: 28px;
      color: #ff6b6b;
      margin: 0 0 10px;
    }
    .content p {
      font-size: 16px;
      color: #666;
      margin: 0 0 20px;
    }
    .donate-button {
      background: linear-gradient(135deg, #ff6b6b, #ff8888);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 16px 32px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(255, 107, 107, 0.25);
    }
    .donate-button:hover {
      opacity: 0.9;
    }
    .bottom-nav {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 12px 12px 16px;
      border-top: 1px solid #f5e0db;
      background: white;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: #8a6c6c;
      font-size: 12px;
      text-decoration: none;
    }
    .nav-icon {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff3f2;
      color: #ff6b6b;
      font-size: 18px;
    }
    .nav-item.active {
      color: #ff6b6b;
      font-weight: bold;
    }
    .nav-item.active .nav-icon {
      background: #ff6b6b;
      color: white;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="header">
      MyDogCrush
      <button class="session-button" id="sessionButton" onclick="toggleSession()">Iniciar sesión</button>
    </div>

    <div class="content">
      <h1>❤️ Apoya nuestro proyecto</h1>
      <p>Tu donación nos ayuda a mantener y mejorar MyDogCrush para reunir a más perros y sus dueños.</p>
      <button class="donate-button" onclick="procesarDonacion()">Donar ahora</button>
    </div>

    <div class="bottom-nav">
      <a class="nav-item" href="photos.html">
        <div class="nav-icon">👤</div>
        <span>Perfil</span>
      </a>
      <a class="nav-item" href="chats.html">
        <div class="nav-icon">💌</div>
        <span>Chats</span>
      </a>
      <a class="nav-item" href="main.html">
        <div class="nav-icon">💬</div>
        <span>Ver perfiles</span>
      </a>
      <a class="nav-item active" href="donate.html">
        <div class="nav-icon">❤️</div>
        <span>Donar</span>
      </a>
      <a class="nav-item" href="account.html">
        <div class="nav-icon">⚙️</div>
        <span>Cuenta</span>
      </a>
    </div>
  </div>

  <script>
    function toggleSession() {
      const button = document.getElementById('sessionButton');
      const isLoggedIn = localStorage.getItem('mydogcrushLoggedIn') === 'true';

      if (isLoggedIn) {
        localStorage.removeItem('mydogcrushLoggedIn');
        window.location.href = 'index.html';
      } else {
        window.location.href = 'login.html';
      }
    }

    function procesarDonacion() {
      alert('¡Gracias por tu intención de donar! Esta funcionalidad se habilitará pronto.');
    }

    function updateSessionButton() {
      const button = document.getElementById('sessionButton');
      const isLoggedIn = localStorage.getItem('mydogcrushLoggedIn') === 'true';
      button.textContent = isLoggedIn ? 'Cerrar sesión' : 'Iniciar sesión';
    }

    window.addEventListener('load', () => { updateSessionButton(); });
  </script>
</body>
</html>
